<div class="d-flex gap-2 mb-3">
  {% for item in category_legend %}
  <div style="flex:1;background:rgba({{ item.rgb }},0.18);border-radius:10px;padding:0.35rem 0;text-align:center;">
    <span style="font-size:0.8rem;font-weight:700;color:rgba({{ item.rgb }},1);letter-spacing:0.02em;">{{ item.label }}</span>
  </div>
  {% endfor %}
</div>
