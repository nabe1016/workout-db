<div class="d-flex gap-2 mb-3">
  {% for item in category_legend %}
  <div style="flex:1;background:rgba({{ item.rgb }},0.18);border-radius:10px;padding:0.4rem 0.3rem;text-align:center;">
    <div style="font-size:0.8rem;font-weight:700;color:rgba({{ item.rgb }},1);letter-spacing:0.02em;">{{ item.label }}</div>
    {% if category_exp is defined %}
    <div style="font-size:0.72rem;font-weight:600;color:rgba({{ item.rgb }},0.85);margin-top:0.1rem;letter-spacing:-0.01em;">
      {{ "{:,}".format(category_exp.get(item.label, 0)) }}
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
