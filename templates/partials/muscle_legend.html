{# カードの色はカテゴリ（部位）を示す #}
<div class="d-flex align-items-center gap-2 flex-wrap" style="font-size:0.75rem;color:var(--txt-2);">
  <span>カード色:</span>
  {% for item in category_legend %}
  <span class="d-inline-flex align-items-center gap-1">
    <span style="width:10px;height:10px;border-radius:50%;background:rgba({{ item.rgb }},0.75);display:inline-block;flex-shrink:0;"></span>
    {{ item.label }}
  </span>
  {% endfor %}
</div>
